version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/infra/database/querie"
    schema: "internal/infra/database/migration"
    gen:
      go:
        package: "sqlc"
        out: "internal/adapter/repository/postgres/sqlc"
        sql_package: "pgx/v5"
        overrides:
        - db_type: "uuid"
          nullable: false
          go_type:
            import: "github.com/google/uuid"
            type: "UUID"
        - column: "auth.users.birth_date"
          go_type: "time.Time"